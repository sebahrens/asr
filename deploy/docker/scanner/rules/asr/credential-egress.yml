rules:
  - id: asr.generic.bearer-token-egress
    languages: [generic]
    severity: ERROR
    message: >
      Embedded bearer token appears in outbound request code. Secrets must not
      be hard-coded into submitted skills.
    metadata:
      confidence: HIGH
      category: security
      cwe: "CWE-798"
      license: "ASR-authored"
    pattern-regex: '(?i)(authorization|headers?)\s*[:=]\s*["''][^"'']*bearer\s+[A-Za-z0-9._~+/=-]{12,}'

  - id: asr.generic.bearer-token-header-egress
    languages: [generic]
    severity: ERROR
    message: >
      Code sends a bearer token in an outbound authorization header. Review
      this against declared network permissions and secret-handling policy.
    metadata:
      confidence: MEDIUM
      category: security
      cwe: "CWE-200"
      license: "ASR-authored"
    pattern-regex: '(?i)authorization[^\n]{0,120}\bbearer\b'

  - id: asr.generic.api-key-egress
    languages: [generic]
    severity: ERROR
    message: >
      API key material appears to be embedded in outbound request code. Secrets
      must come from environment or managed secret stores.
    metadata:
      confidence: HIGH
      category: security
      cwe: "CWE-798"
      license: "ASR-authored"
    pattern-regex: '(?i)(x-api-key|api[_-]?key|access[_-]?token)\s*[:=]\s*["''][A-Za-z0-9._~+/=-]{16,}["'']'

  - id: asr.generic.ld-preload-runtime-linker
    languages: [generic]
    severity: ERROR
    message: >
      Runtime linker manipulation through LD_PRELOAD can load native payloads
      outside normal package review.
    metadata:
      confidence: HIGH
      category: security
      cwe: "CWE-829"
      license: "ASR-authored"
    pattern-regex: '(?i)\bLD_PRELOAD\b'
