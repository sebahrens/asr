# ASR Trivy baseline. CLI-set output, timeout, and severity override the
# corresponding defaults so runtime policy can follow SCAN_SEVERITY_THRESHOLD.
scan:
  scanners:
    - vuln
    - misconfig
  disable-telemetry: true
  skip-version-check: true
  parallel: 5

format: sarif
ignorefile: /opt/scan/.trivyignore
severity:
  - CRITICAL
  - HIGH
  - MEDIUM

db:
  repository:
    - mirror.gcr.io/aquasec/trivy-db:2
    - ghcr.io/aquasecurity/trivy-db:2
  java-repository:
    - mirror.gcr.io/aquasec/trivy-java-db:1
    - ghcr.io/aquasecurity/trivy-java-db:1
  skip-update: false
  java-skip-update: false
  no-progress: true

misconfiguration:
  include-non-failures: false
  scanners:
    - cloudformation
    - dockerfile
    - helm
    - kubernetes
    - terraform
    - terraformplan-json

vulnerability:
  severity-source:
    - auto
  ignore-unfixed: false
