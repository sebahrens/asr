# asr dev stack
#
# See specs/deployment.md for the canonical dev stack definition.

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: asr-forgejo
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./data/forgejo:/data
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__security__SECRET_KEY=${FORGEJO_SECRET_KEY:?Run "node deploy/docker/prepare-env.mjs" to generate Forgejo secrets}
      - FORGEJO__security__INTERNAL_TOKEN=${FORGEJO_INTERNAL_TOKEN:?Run "node deploy/docker/prepare-env.mjs" to generate Forgejo secrets}
      - FORGEJO__security__REVERSE_PROXY_TRUSTED_PROXIES=127.0.0.0/8,::1/128
      - FORGEJO__service__DISABLE_REGISTRATION=true
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: asr-api
    ports:
      - "3001:3001"
    volumes:
      - ./data/api:/app/data
    environment:
      - NODE_ENV=development
      - AUTH_MODE=mock
      - MOCK_USER_SUB=dev-user-0001
      - MOCK_USER_ROLES=Submitter,Compliance
      - FORGEJO_URL=http://forgejo:3000
      - FORGEJO_UPLOAD_TOKEN=${FORGEJO_ADMIN_TOKEN:-}
      - FORGEJO_MERGE_TOKEN=${FORGEJO_ADMIN_TOKEN:-}
      - FORGEJO_OWNER=asr-admin
      - FORGEJO_REPO=skills-registry
      - FORGEJO_BOOTSTRAP_BRANCH_PROTECTION=true
      - DATABASE_PATH=/app/data/workflow.db
      - PORT=3001
      - LLM_SCREEN_PROVIDER=${LLM_SCREEN_PROVIDER:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - LLM_SCREEN_CONTEXT_TOKENS=${LLM_SCREEN_CONTEXT_TOKENS:-}
    depends_on:
      - forgejo
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
      args:
        - VITE_API_URL=http://localhost:3001
        - VITE_AUTH_MODE=mock
        - VITE_ENABLE_MOCK_AUTH=true
    container_name: asr-web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
